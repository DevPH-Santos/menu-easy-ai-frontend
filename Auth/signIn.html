<script>

    const cpfInput = document.getElementById('cpfInput')
    cpfInput.addEventListener('input', () => {
        let v = cpfInput.value.replace(/\D/g, '').substring(0, 11)

        if (v.length > 9) v = v.replace(/^(\d{9})(\d+)/, '$1-$2')
        if (v.length > 6) v = v.replace(/^(\d{6})(\d+)/, '$1.$2')
        if (v.length > 3) v = v.replace(/^(\d{3})(\d+)/, '$1.$2')

        cpfInput.value = v
    })

    function toggleSenha() {

        const senha = document.getElementById("senha");
        const icone = document.getElementById("iconeSenha");

        if (senha.type === "password") {
            senha.type = "text";
            icone.textContent = "visibility_off";
        } else {
            senha.type = "password";
            icone.textContent = "visibility";
        }

    }

    function mostrarErro(msg) {
        const el = document.getElementById("erroLogin");
        el.textContent = msg;
        el.classList.remove("hidden");
    }

    const form = document.querySelector("form");

    const API = "https://menu-easy-ai-backend.onrender.com";

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const cpf = document.getElementById("cpfInput").value;
        const senha = document.getElementById("senha").value;

        try {
            const response = await fetch(`${API}/api/usuarios/login`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ cpf, senha })
            });

            const data = await response.json();

            if (!response.ok) {
                mostrarErro(data.erro || "Erro no login");
                return;
            }

            localStorage.setItem("usuario", JSON.stringify(data.usuario));
            window.location.href = "../index.html";

        } catch (error) {
            console.error(error);
            mostrarErro("Erro ao conectar com o servidor");
        }
    });

</script>
